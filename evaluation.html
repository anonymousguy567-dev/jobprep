<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Written Evaluation - UniDocs</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #0b0c10; color: #ffffff; height: 100vh; overflow: hidden; position: relative;
            transition: background-color 0.4s ease, color 0.4s ease; display: flex; flex-direction: column;
        }

        .bg-blobs { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; transition: 0.4s;}
        .blob { position: absolute; filter: blur(120px); opacity: 0.2; animation: float 14s infinite alternate ease-in-out; }
        .blob1 { width: 350px; height: 350px; background: #e91e63; top: -10%; left: -5%; animation-delay: 0s; }
        .blob2 { width: 400px; height: 400px; background: #00bcd4; bottom: -10%; right: -5%; animation-delay: 3s; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, -30px) scale(1.05); } }

        /* 🟢 Navbar 🟢 */
        .navbar {
            width: 100%; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 12, 16, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100;
        }
        .nav-brand { font-size: 22px; font-weight: 900; color: #00e676; letter-spacing: 1px; }
        .nav-buttons { display: flex; gap: 15px; align-items: center; }
        
        .theme-toggle-btn { background: transparent; color: #ffd700; border: none; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .theme-toggle-btn:hover { transform: rotate(20deg) scale(1.1); }
        .nav-btn { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; color: #fff; transition: 0.3s;}
        .nav-btn:hover { background: rgba(255,255,255,0.1); }

        /* 🟢 Dashboard View 🟢 */
        .container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 30px 15px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto;}
        .clay-box { background: #1e1e26; padding: 30px; border-radius: 25px; box-shadow: 12px 12px 25px rgba(0,0,0,0.5), -8px -8px 20px rgba(255,255,255,0.02), inset 3px 3px 8px rgba(255,255,255,0.05), inset -5px -5px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.02); margin-bottom: 20px; transition: 0.4s; }
        
        h3 { color: #00bcd4; margin-bottom: 20px; text-align: center; font-size: 24px;}
        select { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); background: #15151a; color: #fff; outline: none; font-size: 15px; font-weight: bold; box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5); margin-bottom: 20px;}
        
        .action-btn { padding: 14px 25px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 15px; border: none; transition: 0.3s; box-shadow: 4px 4px 10px rgba(0,0,0,0.3), inset 2px 2px 4px rgba(255,255,255,0.2); }
        .action-btn:active { transform: scale(0.96); box-shadow: inset 3px 3px 8px rgba(0,0,0,0.4); }

        .queue-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .queue-tab { flex: 1; padding: 12px; text-align: center; background: #15151a; border-radius: 12px; cursor: pointer; font-weight: bold; color: #a0a0b0; transition: 0.3s; border: 1px solid rgba(255,255,255,0.02); }
        .queue-tab.active { background: #00bcd4; color: #000; box-shadow: 0 4px 15px rgba(0,188,212,0.3); border: none; }
        
        .pending-card { text-align: center; padding: 40px 20px; background: rgba(255,183,77,0.1); border: 1px dashed #ffb74d; border-radius: 20px; }
        .pending-card h2 { color: #ffb74d; font-size: 40px; margin-bottom: 10px; }
        .pending-card p { color: #e0e0e0; margin-bottom: 20px; }

        .res-table { width: 100%; border-collapse: collapse; text-align: left; }
        .res-table th { padding: 12px; color: #a0a0b0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .res-table td { padding: 15px 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: bold; }
        
        /* 🟢 Evaluation View (Slider) 🟢 */
        #evaluationView { display: none; flex-direction: column; height: 100vh; position: absolute; top: 0; left: 0; width: 100%; background: #0b0c10; z-index: 200; }
        
        .eval-header { flex-shrink: 0; display: flex; justify-content: space-between; padding: 10px 20px; background: #15151a; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .eval-header-text { font-size: 16px; color: #00e676; font-weight: bold; }
        .eval-header-sub { font-size: 13px; color: #a0a0b0; }

        .eval-slider-viewport { flex-grow: 1; overflow: hidden; position: relative; width: 100%; display: flex; flex-direction: column;}
        .eval-slider-track { display: flex; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); width: 100%;}
        .eval-slide { min-width: 100%; height: 100%; display: flex; flex-direction: column; padding: 10px; }
        
        /* Top Info & Toolbar */
        .slide-top-info { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; margin-bottom: 10px;}
        .q-title { font-weight: bold; color: #00bcd4; font-size: 15px; margin-bottom: 8px; text-align: center;}
        
        .toolbar { display: inline-flex; gap: 8px; padding: 6px 12px; background: rgba(0,0,0,0.6); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .tool-btn { background: #202028; border: 1px solid rgba(255,255,255,0.1); font-size: 16px; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; color: #fff;}
        .tool-btn.active { background: rgba(0, 188, 212, 0.2); border-color: #00bcd4; }
        .t-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 4px; }
        
        /* 🟢 Horizontal Scroll Canvas Wrapper (No vertical scroll) 🟢 */
        .canvas-wrapper { 
            flex-grow: 1; 
            display: block; 
            background: #1e1e26; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            overflow-y: hidden; /* No up-down scroll */
            overflow-x: auto;   /* Side scroll allowed */
            position: relative; padding: 10px;
        }
        
        .canvas-wrapper::-webkit-scrollbar { height: 8px; }
        .canvas-wrapper::-webkit-scrollbar-thumb { background: rgba(0, 188, 212, 0.5); border-radius: 10px; }
        
        .draw-canvas { 
            cursor: crosshair; touch-action: none; display: block; margin: 0 auto;
            max-width: none; /* Let it expand sideways if aspect ratio requires */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; background: transparent;
        }

        /* Bottom Control Bar */
        .bottom-bar { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #15151a; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .marks-input-wrapper { display: flex; align-items: center; gap: 8px; background: rgba(0,230,118,0.1); padding: 5px 12px; border-radius: 10px; border: 1px solid #00e676; }
        .marks-input-wrapper input { width: 60px; padding: 6px; background: transparent; border: none; box-shadow: none; color: #00e676; font-size: 18px; text-align: center; outline: none; font-weight: bold;}
        .marks-input-wrapper span { color: #00e676; font-weight: bold; font-size: 16px; }
        
        .nav-buttons { display: flex; gap: 10px; }

        /* Final Submit State */
        .final-submit-state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; padding: 30px; text-align: center; position: absolute; top:0; left:0; background: #0b0c10; z-index: 50;}

        /* Loading */
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #00bcd4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 🟡🟢 LIGHT MODE 🟢🟡 */
        body.light-mode { background-color: #F0EBE1; color: #2C3539; } 
        body.light-mode .bg-blobs { opacity: 0.05; }
        body.light-mode .navbar { background: rgba(232, 224, 213, 0.9); border-color: rgba(102, 76, 40, 0.1); }
        body.light-mode .nav-brand { color: #00A04A; }
        body.light-mode .theme-toggle-btn { color: #E1A95F; }
        body.light-mode .nav-btn { background: #FDFCF9; color: #664C28; border-color: rgba(102, 76, 40, 0.1); box-shadow: 2px 2px 5px rgba(102, 76, 40, 0.1); }
        body.light-mode .clay-box { background: #FDFCF9; border-color: rgba(102, 76, 40, 0.1); box-shadow: 10px 10px 20px rgba(102, 76, 40, 0.1), -5px -5px 15px #ffffff, inset 2px 2px 5px #ffffff; }
        body.light-mode h3 { color: #008394; }
        body.light-mode select { background: #F0EBE1; color: #333; border-color: rgba(102, 76, 40, 0.2); box-shadow: inset 2px 2px 5px rgba(102, 76, 40, 0.1); }
        body.light-mode .queue-tab { background: #F0EBE1; color: #666; border-color: rgba(102, 76, 40, 0.1); }
        body.light-mode .queue-tab.active { background: #008394; color: #fff; }
        body.light-mode .pending-card { background: rgba(225, 169, 95, 0.1); border-color: #E1A95F; }
        body.light-mode .pending-card h2 { color: #D38B28; }
        body.light-mode .pending-card p { color: #666; }
        body.light-mode .res-table th { color: #8A7254; border-color: rgba(102, 76, 40, 0.1); }
        body.light-mode .res-table td { border-color: rgba(102, 76, 40, 0.05); }
        
        body.light-mode #evaluationView { background: #F0EBE1; }
        body.light-mode .eval-header, body.light-mode .bottom-bar { background: #E8E0D5; border-color: rgba(102, 76, 40, 0.1); }
        body.light-mode .eval-header-text { color: #00A04A; }
        body.light-mode .eval-header-sub { color: #666; }
        body.light-mode .toolbar { background: rgba(232, 224, 213, 0.9); border-color: rgba(102, 76, 40, 0.1); }
        body.light-mode .tool-btn { background: #FDFCF9; color: #333; border-color: rgba(102, 76, 40, 0.2); }
        body.light-mode .tool-btn.active { background: rgba(0, 131, 148, 0.1); border-color: #008394; }
        body.light-mode .canvas-wrapper { background: #FDFCF9; border-color: rgba(102, 76, 40, 0.1);}
        body.light-mode .final-submit-state { background: #F0EBE1; }
        body.light-mode input[type="number"]::-webkit-inner-spin-button, body.light-mode input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Mobile Layout */
        @media (max-width: 768px) {
            .eval-header { padding: 10px 15px; }
            .nav-brand { font-size: 18px; }
            .eval-slide { padding: 5px; }
            .bottom-bar { padding: 10px; flex-wrap: wrap; gap: 10px; justify-content: center; }
            .nav-buttons { width: 100%; justify-content: space-between; }
            .action-btn { padding: 10px 15px; font-size: 14px; flex: 1;}
            .toolbar { padding: 6px; gap: 4px; }
            .tool-btn { padding: 6px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        
        // 🟢 Mobile Warning Popup 🟢
        document.addEventListener("DOMContentLoaded", () => {
            Swal.fire({
                toast: true,
                position: 'top',
                icon: 'info',
                title: 'Plz use your laptop, this site is not optimize for mobile',
                showConfirmButton: false,
                timer: 5000,
                background: document.body.classList.contains('light-mode') ? '#FDFCF9' : '#1e1e26',
                color: document.body.classList.contains('light-mode') ? '#222' : '#fff'
            });
        });
    </script>
    
    <div class="bg-blobs"><div class="blob blob1"></div><div class="blob blob2"></div></div>

    <nav class="navbar">
        <div class="nav-brand">Evaluation Panel</div>
        <div class="nav-buttons">
            <button class="theme-toggle-btn" id="themeToggleBtn">🌞</button>
            <button class="nav-btn" onclick="window.location.href='admin.html'">🔙 Admin Hub</button>
            <button class="nav-btn" style="color:#ff5252;" id="logoutBtn">🚪 Logout</button>
        </div>
    </nav>

    <div class="container" id="dashboardView">
        <div class="clay-box">
            <h3>Select Exam to Evaluate</h3>
            <select id="examSelector"><option value="">-- Loading Written Exams... --</option></select>
            
            <div id="queueContainer" style="display: none; margin-top: 10px;">
                <div class="queue-tabs">
                    <div class="queue-tab active" id="tabPending">⏳ Pending Queue</div>
                    <div class="queue-tab" id="tabEvaluated">✅ Evaluated</div>
                </div>

                <div id="pendingArea">
                    <div class="pending-card" id="pendingCard">
                        <h2 id="pendingCount">0</h2>
                        <p>Scripts waiting for evaluation</p>
                        <button class="action-btn" style="background:#00e676; color:#000;" id="startEvalBtn">🚀 Start Evaluation</button>
                    </div>
                </div>

                <div id="evaluatedArea" style="display: none;">
                    <div style="overflow-x: auto;">
                        <table class="res-table">
                            <thead><tr><th>Roll / Email</th><th>Score</th><th>Action</th></tr></thead>
                            <tbody id="evalTbody"><tr><td colspan="3" style="text-align:center;">No evaluated scripts.</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="evaluationView">
        <div class="eval-header">
            <div>
                <div class="eval-header-text" id="evalRollTxt">Roll: Loading...</div>
                <div class="eval-header-sub" id="evalEmailTxt">Email: Loading...</div>
            </div>
            <button class="nav-btn" style="background:#ff5252; color:#fff; border:none;" onclick="closeEvaluation()">✖ Exit</button>
        </div>

        <div class="eval-slider-viewport">
            <div class="eval-slider-track" id="sliderTrack">
                </div>
            
            <div class="final-submit-state" id="finalSubmitArea">
                <h2 style="color:#ffb74d; margin-bottom:10px;">Review Complete!</h2>
                <p style="color:#a0a0b0; margin-bottom:30px;">You have reached the end of this script.</p>
                
                <div style="background: rgba(0,230,118,0.1); padding: 20px; border-radius: 20px; border: 1px solid #00e676; margin-bottom: 25px; width: 100%; max-width: 400px;">
                    <label style="color: #00e676; display: block; margin-bottom: 10px; font-weight: bold;">Total Marks (Auto-calculated):</label>
                    <input type="number" id="finalTotalMarks" readonly style="width: 100%; background: transparent; border: none; color: #00e676; text-align: center; font-size: 40px; font-weight: bold; outline: none; box-shadow: none;">
                </div>

                <div style="width: 100%; max-width: 400px; margin-bottom: 30px;">
                    <label style="color: #00bcd4; display: block; margin-bottom: 10px; font-weight: bold; text-align: left;">Feedback (Optional):</label>
                    <textarea id="finalFeedback" rows="3" placeholder="Enter any comments..." style="width: 100%; padding: 15px; border-radius: 15px; background: #15151a; color: #fff; border: 1px solid rgba(255,255,255,0.1); resize: none;"></textarea>
                </div>

                <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <button class="action-btn" style="background:#444; color:#fff;" onclick="returnToEvalSlides()">⬅️ Review Again</button>
                    <button class="action-btn" style="background:#00e676; color:#000;" id="submitAndNextBtn">Submit & Next Student 🚀</button>
                </div>
                <p id="submitStatusTxt" style="color:#00e676; margin-top:15px; font-weight:bold;"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc, setDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxJ80HE80F0FEsb1jZpal_YNL6s0S_9xE", authDomain: "mcq-portal-904fd.firebaseapp.com", projectId: "mcq-portal-904fd", storageBucket: "mcq-portal-904fd.firebasestorage.app", messagingSenderId: "977853699063", appId: "1:977853699063:web:0fb1b7e2be9afadb7b54f2" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
        const IMGBB_API_KEY = "35b7e96a7a04b874aa3e4a2949ff11cc"; const ADMIN_EMAILS = ["hridoymeruet@gmail.com", "mcqportal198@gmail.com"];

        const themeToggleBtn = document.getElementById('themeToggleBtn');
        themeToggleBtn.addEventListener('click', () => { document.body.classList.toggle('light-mode'); const isLight = document.body.classList.contains('light-mode'); localStorage.setItem('theme', isLight ? 'light' : 'dark'); themeToggleBtn.innerHTML = isLight ? '🌙' : '🌞'; });

        let pendingList = []; let evaluatedList = []; let questionsData = [];
        let canvasRegistry = {}; let currentSlideIndex = 0; let currentSubId = null; let currentSubDataGlobal = null;

        onAuthStateChanged(auth, (user) => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) { window.location.href = "admin.html"; } 
            else { loadExams(); }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        async function loadExams() {
            const selector = document.getElementById('examSelector');
            try {
                const q = query(collection(db, "exams"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q); let html = '<option value="">-- Select Written Exam --</option>';
                snap.forEach(doc => { if(doc.data().type === 'written') html += `<option value="${doc.id}">✍️ ${doc.data().title}</option>`; });
                selector.innerHTML = html;
            } catch(e) { selector.innerHTML = '<option>Error loading exams</option>'; }
        }

        document.getElementById('examSelector').addEventListener('change', async (e) => {
            const examId = e.target.value; const qc = document.getElementById('queueContainer');
            if(!examId) { qc.style.display = 'none'; return; } qc.style.display = 'block';
            
            questionsData = [];
            const qSnap = await getDocs(collection(db, "exams", examId, "questions"));
            qSnap.forEach(doc => { questionsData.push({id: doc.id, data: doc.data()}); });
            questionsData.sort((a, b) => {
                let tA = a.data.timestamp?.toMillis ? a.data.timestamp.toMillis() : (a.data.timestamp?.seconds ? a.data.timestamp.seconds * 1000 : a.data.timestamp || 0);
                let tB = b.data.timestamp?.toMillis ? b.data.timestamp.toMillis() : (b.data.timestamp?.seconds ? b.data.timestamp.seconds * 1000 : b.data.timestamp || 0);
                return tA - tB;
            });

            fetchSubmissions(examId);
        });

        async function fetchSubmissions(examId) {
            document.getElementById('startEvalBtn').innerText = "Loading..."; document.getElementById('startEvalBtn').disabled = true;
            pendingList = []; evaluatedList = [];
            const snap = await getDocs(query(collection(db, "results"), where("examId", "==", examId)));
            snap.forEach(doc => {
                const data = doc.data();
                if(data.status === 'evaluated') evaluatedList.push({id: doc.id, ...data});
                else pendingList.push({id: doc.id, ...data});
            });
            
            document.getElementById('pendingCount').innerText = pendingList.length;
            document.getElementById('startEvalBtn').innerText = pendingList.length > 0 ? "🚀 Start Evaluation" : "✅ All Caught Up!";
            document.getElementById('startEvalBtn').disabled = pendingList.length === 0;

            let eHtml = ""; evaluatedList.sort((a,b) => b.score - a.score).forEach((sub, i) => {
                eHtml += `<tr><td>${sub.rollNumber}<br><span style="font-size:11px; color:#888;">${sub.email}</span></td><td style="color:#00bcd4;">${sub.score}</td><td><button class="action-btn" style="padding:6px 12px; font-size:12px; background:#ffb74d; color:#000;" onclick="reviewScript(${i})">Review</button></td></tr>`;
            });
            document.getElementById('evalTbody').innerHTML = eHtml || '<tr><td colspan="3" style="text-align:center;">No evaluated scripts.</td></tr>';
        }

        document.getElementById('tabPending').addEventListener('click', () => { document.getElementById('tabPending').classList.add('active'); document.getElementById('tabEvaluated').classList.remove('active'); document.getElementById('pendingArea').style.display='block'; document.getElementById('evaluatedArea').style.display='none'; });
        document.getElementById('tabEvaluated').addEventListener('click', () => { document.getElementById('tabEvaluated').classList.add('active'); document.getElementById('tabPending').classList.remove('active'); document.getElementById('evaluatedArea').style.display='block'; document.getElementById('pendingArea').style.display='none'; });

        document.getElementById('startEvalBtn').addEventListener('click', () => { if(pendingList.length > 0) openEvaluation(pendingList[0]); });
        window.reviewScript = function(index) { openEvaluation(evaluatedList[index]); };

        window.closeEvaluation = function() {
            document.getElementById('evaluationView').style.display = 'none';
            document.getElementById('dashboardView').style.display = 'flex';
            fetchSubmissions(document.getElementById('examSelector').value); 
        };

        // 🟢 Canvas Utilities 🟢
        async function uploadImageToImgBB(blob, name) {
            const formData = new FormData(); formData.append('image', new File([blob], name, { type: "image/jpeg" }));
            try { const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData }); const data = await response.json(); return data.success ? data.data.url : null; } catch(e) { return null; }
        }

        function saveState(qId) {
            const d = canvasRegistry[qId]; d.step++; if(d.step < d.history.length) d.history.length = d.step;
            d.history.push(d.canvas.toDataURL()); d.isModified = true;
        }

        function attachEvents(qId) {
            const d = canvasRegistry[qId]; let isDrawing = false;
            function getC(e) { const r = d.canvas.getBoundingClientRect(); const sX = d.canvas.width / r.width; const sY = d.canvas.height / r.height; let cX = e.touches ? e.touches[0].clientX : e.clientX; let cY = e.touches ? e.touches[0].clientY : e.clientY; return { x: (cX - r.left) * sX, y: (cY - r.top) * sY }; }
            function start(e) { isDrawing = true; const c = getC(e); d.ctx.beginPath(); d.ctx.moveTo(c.x, c.y); }
            function draw(e) { if(!isDrawing) return; e.preventDefault(); const c = getC(e); d.ctx.lineTo(c.x, c.y); d.ctx.stroke(); d.isModified = true; }
            function stop() { if(isDrawing) { isDrawing = false; d.ctx.closePath(); saveState(qId); } }
            d.canvas.addEventListener('mousedown', start); d.canvas.addEventListener('mousemove', draw); d.canvas.addEventListener('mouseup', stop); d.canvas.addEventListener('mouseout', stop);
            d.canvas.addEventListener('touchstart', start, {passive:false}); d.canvas.addEventListener('touchmove', draw, {passive:false}); d.canvas.addEventListener('touchend', stop);
        }

        // 🟢 Lazy Loading Canvas Init with Vertical Auto-Fit & Horizontal Scroll 🟢
        function initCanvasForSlide(slideIndex) {
            if (slideIndex < 0 || slideIndex >= questionsData.length) return;
            const qItem = questionsData[slideIndex];
            const qId = qItem.id;
            
            if(canvasRegistry[qId]) return;

            let sAns = (currentSubDataGlobal.studentImageUrls && currentSubDataGlobal.studentImageUrls[qId]) ? currentSubDataGlobal.studentImageUrls[qId] : null; 
            if (!sAns && currentSubDataGlobal.studentImageUrl && qItem.data.qNum === 1) sAns = currentSubDataGlobal.studentImageUrl; 
            let cAns = (currentSubDataGlobal.checkedImageUrls && currentSubDataGlobal.checkedImageUrls[qId]) ? currentSubDataGlobal.checkedImageUrls[qId] : null;
            
            if(sAns || cAns) {
                const canvas = document.getElementById(`canvas_${qId}`);
                if(canvas) {
                    const wrapper = document.getElementById(`wrapper_${qId}`);
                    wrapper.style.position = 'relative';
                    const tempLoading = document.createElement('div');
                    tempLoading.innerHTML = "Loading image..."; tempLoading.style.position="absolute"; tempLoading.style.color="#00bcd4";
                    wrapper.appendChild(tempLoading);

                    const ctx = canvas.getContext('2d'); const imgBase = new Image(); imgBase.crossOrigin = "Anonymous";
                    imgBase.onload = () => {
                        if(tempLoading.parentNode) wrapper.removeChild(tempLoading);
                        
                        // 🟢 Make height fit exactly to screen (no up-down scroll), allow width to spill over for side scroll 🟢
                        let maxH = wrapper.clientHeight - 20; 
                        if (maxH < 200) maxH = 400; // Fallback minimum
                        
                        let ratio = maxH / imgBase.height;
                        let cHeight = maxH;
                        let cWidth = imgBase.width * ratio;
                        
                        canvas.width = cWidth; canvas.height = cHeight;
                        
                        canvas.style.backgroundImage = `url(${sAns || cAns})`;
                        canvas.style.backgroundSize = "100% 100%";
                        
                        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                        canvasRegistry[qId] = { canvas, ctx, imgBase, width: cWidth, height: cHeight, isModified: false, history: [], step: -1, mode: 'pen' };
                        
                        if (cAns) {
                            const imgChecked = new Image(); imgChecked.crossOrigin = "Anonymous";
                            imgChecked.onload = () => { ctx.drawImage(imgChecked, 0, 0, cWidth, cHeight); saveState(qId); canvasRegistry[qId].isModified = false; attachEvents(qId); };
                            imgChecked.src = cAns;
                        } else { saveState(qId); attachEvents(qId); }
                    }; 
                    imgBase.onerror = () => { if(tempLoading.parentNode) tempLoading.innerHTML = "Failed to load image."; tempLoading.style.color = "red"; };
                    imgBase.src = sAns || cAns; 
                }
            }
        }

        // 🟢 Canvas Slider UI (Lazy Render) 🟢
        async function openEvaluation(subData) {
            currentSubId = subData.id; currentSubDataGlobal = subData; canvasRegistry = {}; window.currentEvalSlide = 0;
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('evaluationView').style.display = 'flex';
            document.getElementById('finalSubmitArea').style.display = 'none';
            document.getElementById('sliderTrack').style.display = 'flex';
            
            document.getElementById('evalRollTxt').innerText = `Roll: ${subData.rollNumber}`;
            document.getElementById('evalEmailTxt').innerText = `Email: ${subData.email}`;
            
            const track = document.getElementById('sliderTrack'); track.innerHTML = '<div style="width:100%; text-align:center; padding:50px;"><div class="loader"></div></div>';
            track.style.transform = `translateX(0%)`;

            let html = ""; let studentMarks = subData.questionMarks || {};
            
            questionsData.forEach((qItem, index) => {
                const q = qItem.data; const qId = qItem.id; let qNum = index + 1;
                let sAns = (subData.studentImageUrls && subData.studentImageUrls[qId]) ? subData.studentImageUrls[qId] : null; if (!sAns && subData.studentImageUrl && qNum === 1) sAns = subData.studentImageUrl;
                let cAns = (subData.checkedImageUrls && subData.checkedImageUrls[qId]) ? subData.checkedImageUrls[qId] : null; let urlToDraw = cAns || sAns;
                
                html += `<div class="eval-slide" id="slide_${index}">`;
                
                html += `<div class="slide-top-info">`;
                html += `<div class="q-title">Q${qNum}: ${q.question || '(Image)'} <span style="color:#ffb74d; margin-left:10px;">[Max: ${q.maxMarks || 0}]</span></div>`;
                
                if(urlToDraw) {
                    html += `
                    <div class="toolbar" data-qid="${qId}">
                        <button class="tool-btn active" onclick="setTool('${qId}', 'pen', this)" title="Pen">✏️</button>
                        <button class="tool-btn" onclick="setTool('${qId}', 'eraser', this)" title="Eraser">🧽</button>
                        <div class="t-divider"></div>
                        <button class="tool-btn" onclick="execTool('${qId}', 'undo')" title="Undo">↩️</button>
                        <button class="tool-btn" onclick="execTool('${qId}', 'redo')" title="Redo">↪️</button>
                        <button class="tool-btn" onclick="execTool('${qId}', 'clear')" title="Clear All">🧹</button>
                        <div class="t-divider"></div>
                        <button class="tool-btn" onclick="execTool('${qId}', 'zoom')" title="Full Screen">🔍</button>
                    </div>`;
                }
                html += `</div>`; 

                // 🟢 Proper "Not answered" UI Fix 🟢
                if(urlToDraw) {
                    html += `<div class="canvas-wrapper" id="wrapper_${qId}"><canvas id="canvas_${qId}" class="draw-canvas"></canvas></div>`;
                } else {
                    html += `<div class="canvas-wrapper" style="display:flex; justify-content:center; align-items:center; color:#ff5252; font-size:28px; font-weight:bold; border: 2px dashed #ff5252; background: rgba(255,82,82,0.05);">Not answered</div>`;
                }

                html += `
                <div class="bottom-bar">
                    <div class="marks-input-wrapper">
                        <input type="number" class="q-mark-input" id="mark_${qId}" data-qid="${qId}" value="${studentMarks[qId]!==undefined?studentMarks[qId]:""}" placeholder="0" step="0.5" max="${q.maxMarks || 10}" oninput="validateMark(this)">
                        <span>/ ${q.maxMarks || 10}</span>
                    </div>
                    <div class="nav-buttons">`;
                
                if(index > 0) html += `<button class="action-btn" style="background:#444; color:#fff;" onclick="goToSlide(${index - 1})">⬅️ Prev</button>`;
                
                if(index < questionsData.length - 1) html += `<button class="action-btn" style="background:#2196f3; color:#fff;" onclick="attemptNext(${index}, '${qId}')">Next ➡️</button>`;
                else html += `<button class="action-btn" style="background:#00e676; color:#000;" onclick="attemptNext(${index}, '${qId}')">Finish 🏁</button>`;
                
                html += `</div></div></div>`; 
            });

            track.innerHTML = html;
            document.getElementById('finalFeedback').value = subData.feedback || "";
            updateTotalSum(); 

            // ONLY INITIALIZE THE FIRST SLIDE INITIALLY
            setTimeout(() => {
                initCanvasForSlide(0);
                if (questionsData.length > 1) { setTimeout(() => initCanvasForSlide(1), 500); }
            }, 50);
        }

        window.validateMark = function(inp) {
            let max = parseFloat(inp.getAttribute('max')); let val = parseFloat(inp.value);
            if(!isNaN(val) && val > max) { 
                inp.value = max; 
                Swal.fire({toast:true, position:'top-end', icon:'warning', title:`Max marks is ${max}`, showConfirmButton:false, timer:2000, background: document.body.classList.contains('light-mode') ? '#FDFCF9' : '#1e1e26', color: document.body.classList.contains('light-mode') ? '#222' : '#fff'}); 
            }
            updateTotalSum();
        }

        window.updateTotalSum = function() {
            let total = 0; document.querySelectorAll('.q-mark-input').forEach(inp => { let v = parseFloat(inp.value); if(!isNaN(v)) total += v; });
            document.getElementById('finalTotalMarks').value = total.toFixed(2);
        }

        window.attemptNext = function(currentIndex, qId) {
            const inp = document.getElementById(`mark_${qId}`);
            if(!inp || inp.value === "" || isNaN(parseFloat(inp.value))) {
                Swal.fire({toast:true, position:'bottom', icon:'warning', title:'Enter marks to proceed!', showConfirmButton:false, timer:2000, background: '#ff5252', color: '#fff'});
                if(inp) inp.focus();
                return;
            }
            if(currentIndex < questionsData.length - 1) goToSlide(currentIndex + 1);
            else showFinalScreen();
        }

        window.goToSlide = function(index) {
            window.currentEvalSlide = index;
            document.getElementById('sliderTrack').style.transform = `translateX(-${index * 100}%)`;
            initCanvasForSlide(index);
            if (index + 1 < questionsData.length) { setTimeout(() => initCanvasForSlide(index + 1), 200); }
        }

        window.showFinalScreen = function() {
            updateTotalSum();
            document.getElementById('sliderTrack').style.display = 'none';
            document.getElementById('finalSubmitArea').style.display = 'flex';
        }

        window.returnToEvalSlides = function() {
            document.getElementById('finalSubmitArea').style.display = 'none';
            document.getElementById('sliderTrack').style.display = 'flex';
            goToSlide(questionsData.length - 1);
        };

        // 🟢 Global Toolbar Actions 🟢
        window.setTool = function(qId, tool, btnEl) {
            const d = canvasRegistry[qId]; if(!d) return;
            document.querySelectorAll(`.toolbar[data-qid="${qId}"] .tool-btn`).forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            d.mode = tool; d.ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
            d.ctx.lineWidth = tool === 'eraser' ? 20 : 4; d.canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
        }

        window.execTool = function(qId, action) {
            const d = canvasRegistry[qId]; if(!d) return;
            if(action === 'undo') { if(d.step > 0) { d.step--; restoreCanvasStateLocal(d); } }
            else if(action === 'redo') { if(d.step < d.history.length - 1) { d.step++; restoreCanvasStateLocal(d); } }
            else if(action === 'clear') { 
                d.ctx.globalCompositeOperation = 'source-over'; d.ctx.clearRect(0, 0, d.width, d.height); 
                d.ctx.globalCompositeOperation = d.mode === 'eraser' ? 'destination-out' : 'source-over'; saveState(qId); 
            }
            else if(action === 'zoom') {
                const tempC = document.createElement('canvas'); tempC.width = d.width; tempC.height = d.height; const tCtx = tempC.getContext('2d');
                tCtx.drawImage(d.imgBase, 0, 0, d.width, d.height); tCtx.drawImage(d.canvas, 0, 0, d.width, d.height);
                Swal.fire({ imageUrl: tempC.toDataURL(), imageAlt: 'Script', width: '95%', imageWidth: '100%', showConfirmButton: false, showCloseButton: true, background: document.body.classList.contains('light-mode') ? '#FDFCF9' : '#1e1e26' }); 
            }
        }

        function restoreCanvasStateLocal(d) {
            const img = new Image(); img.crossOrigin = "Anonymous";
            img.onload = () => { 
                d.ctx.globalCompositeOperation = 'source-over'; d.ctx.clearRect(0, 0, d.width, d.height); d.ctx.drawImage(img, 0, 0, d.width, d.height); 
                d.ctx.globalCompositeOperation = d.mode === 'eraser' ? 'destination-out' : 'source-over'; 
            };
            img.src = d.history[d.step]; d.isModified = true;
        }

        // Final Submit Logic
        document.getElementById('submitAndNextBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitAndNextBtn'); btn.innerText = "Saving..."; btn.disabled = true;
            document.getElementById('submitStatusTxt').innerText = "Uploading checked scripts to cloud...";
            
            let qMarks = {}; let totalMarks = 0; document.querySelectorAll('.q-mark-input').forEach(inp => { let v = parseFloat(inp.value); if(!isNaN(v)) { totalMarks+=v; qMarks[inp.getAttribute('data-qid')] = v; } });
            
            let newCheckedUrls = {}; let promises = [];
            for (let qId in canvasRegistry) {
                if(canvasRegistry[qId].isModified) {
                    promises.push(new Promise((resolve) => {
                        const d = canvasRegistry[qId]; const tC = document.createElement('canvas'); tC.width = d.width; tC.height = d.height; const tCtx = tC.getContext('2d');
                        tCtx.drawImage(d.imgBase, 0, 0, d.width, d.height); tCtx.drawImage(d.canvas, 0, 0, d.width, d.height);
                        tC.toBlob(async (blob) => { const url = await uploadImageToImgBB(blob, `checked_${qId}.jpg`); if(url) newCheckedUrls[qId] = url; resolve(); }, 'image/jpeg', 0.85);
                    }));
                }
            }

            try {
                await Promise.all(promises);
                const subRef = doc(db, "results", currentSubId);
                const existingData = (await getDoc(subRef)).data();
                let mergedUrls = existingData.checkedImageUrls || {};
                Object.assign(mergedUrls, newCheckedUrls);

                await setDoc(subRef, { score: parseFloat(totalMarks.toFixed(2)), questionMarks: qMarks, feedback: document.getElementById('finalFeedback').value, status: "evaluated", checkedImageUrls: mergedUrls }, {merge: true});
                
                // Success & Next Routing
                document.getElementById('submitStatusTxt').innerText = "Saved Successfully!";
                setTimeout(() => {
                    btn.innerText = "Submit & Next Student 🚀"; btn.disabled = false; document.getElementById('submitStatusTxt').innerText = "";
                    const currentIdxInPending = pendingList.findIndex(p => p.id === currentSubId);
                    if(currentIdxInPending !== -1) {
                        pendingList.splice(currentIdxInPending, 1);
                        if(pendingList.length > 0) openEvaluation(pendingList[0]);
                        else closeEvaluation();
                    } else { closeEvaluation(); }
                }, 1000);

            } catch(e) { Swal.fire('Error', 'Failed to save evaluation.', 'error'); btn.innerText = "Submit & Next Student 🚀"; btn.disabled = false; document.getElementById('submitStatusTxt').innerText = ""; }
        });
    </script>
</body>
